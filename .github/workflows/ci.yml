name: Go CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: go mod download

      - name: Verify formatting
        run: gofmt -l .

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o ./tmp/main ./cmd/server

      - name: Test
        run: go test -v ./...